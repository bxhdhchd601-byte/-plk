<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космический Защитник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #050505;
            overflow: hidden;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.15);
            border-radius: 8px;
            flex-shrink: 0;
        }

        canvas {
            display: block;
            background: #000;
            cursor: crosshair;
            filter: drop-shadow(0 0 4px rgba(0, 240, 255, 0.5));
        }

        /* === ГЛАВНОЕ МЕНЮ === */
        #mainMenu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.94);
            z-index: 100;
        }

        #menuContent {
            text-align: center;
            padding: 30px 40px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
        }

        #menuContent h1 {
            margin: 0 0 10px;
            font-size: 32px;
            color: #00f0ff;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
        }

        #menuContent p {
            margin: 0 0 20px;
            color: #fff;
            font-size: 14px;
        }

        #difficultySelector {
            margin: 10px 0;
        }

        #difficultySelector span {
            margin-right: 10px;
            font-size: 16px;
            color: #fff;
        }

        #difficultySelector button {
            margin-right: 6px;
            padding: 8px 14px;
            border: 1px solid #00f0ff;
            background: transparent;
            color: #00f0ff;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Courier New', Courier, monospace;
            transition: all 0.2s;
        }

        #difficultySelector button:hover {
            background: rgba(0, 255, 255, 0.2);
        }

        #difficultySelector button.selected {
            background: #00f0ff;
            color: #000;
        }

        #controlsHint {
            margin: 10px 0 0;
            font-size: 13px;
            color: #b8f1ff;
            line-height: 1.6;
        }

        #startButton {
            margin-top: 16px;
            padding: 12px 24px;
            border: 2px solid #00f0ff;
            background: #00f0ff;
            color: #000;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            transition: all 0.2s;
        }

        #startButton:hover {
            background: #fff;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        /* === КНОПКА ПАУЗЫ === */
        #pauseBtn {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 50;
            padding: 8px 16px;
            border: 1px solid #00f0ff;
            background: rgba(0, 0, 0, 0.7);
            color: #00f0ff;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Courier New', Courier, monospace;
            transition: all 0.2s;
        }

        #pauseBtn:hover {
            background: #00f0ff;
            color: #000;
        }

        /* === МЕНЮ ПАУЗЫ === */
        #pauseMenu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 60;
            align-items: center;
            justify-content: center;
        }

        #pauseMenuContent {
            text-align: center;
            padding: 30px 40px;
            border: 1px solid rgba(255, 200, 0, 0.4);
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 40px rgba(255, 200, 0, 0.2);
        }

        #pauseMenuContent h2 {
            margin: 0 0 20px;
            font-size: 28px;
            color: #ffc800;
            text-shadow: 0 0 20px rgba(255, 200, 0, 0.5);
        }

        #pauseMenuContent button {
            display: block;
            width: 220px;
            margin: 10px auto;
            padding: 12px;
            border: 2px solid #ffc800;
            background: transparent;
            color: #ffc800;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            transition: all 0.2s;
        }

        #pauseMenuContent button:hover {
            background: #ffc800;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 200, 0, 0.5);
        }

        /* === АДАПТАЦИЯ === */
        @media (max-width: 600px) {
            #menuContent {
                padding: 20px;
                width: 90%;
            }
            
            #menuContent h1 {
                font-size: 24px;
            }
            
            #difficultySelector button {
                padding: 6px 10px;
                font-size: 12px;
            }
            
            #pauseMenuContent {
                width: 80%;
                padding: 20px;
            }
            
            #pauseMenuContent button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="game-container">
            <!-- ГЛАВНОЕ МЕНЮ -->
            <div id="mainMenu">
                <div id="menuContent">
                    <h1>КОСМИЧЕСКИЙ ЗАЩИТНИК</h1>
                    <p>Выберите режим и сложность</p>
                    <div id="modeSelector">
                        <span>РЕЖИМ:</span>
                        <button data-mode="survival" class="selected">ВЫЖИВАНИЕ</button>
                        <button data-mode="reaction">РЕАКЦИЯ</button>
                    </div>
                    <div id="difficultySelector">
                        <span>СЛОЖНОСТЬ:</span>
                        <button data-diff="easy" class="selected">ЛЁГКАЯ</button>
                        <button data-diff="normal">НОРМАЛЬНАЯ</button>
                        <button data-diff="hard">СЛОЖНАЯ</button>
                    </div>
                    <p id="controlsHint">
                        УПРАВЛЕНИЕ: WASD — движение, МЫШЬ — прицел, ЛКМ — стрельба<br>
                        ПРОБЕЛ — БОМБА | ESC — пауза
                    </p>
                    <button id="startButton">НАЧАТЬ ИГРУ</button>
                </div>
            </div>

            <!-- КНОПКА ПАУЗЫ -->
            <button id="pauseBtn">⏸ ПАУЗА</button>

            <!-- МЕНЮ ПАУЗЫ -->
            <div id="pauseMenu">
                <div id="pauseMenuContent">
                    <h2>⏸ ПАУЗА</h2>
                    <button id="resumeBtn">▶ ПРОДОЛЖИТЬ</button>
                    <button id="restartBtn">🔄 НАЧАТЬ ЗАНОВО</button>
                    <button id="quitBtn">🏠 ВЫЙТИ В МЕНЮ</button>
                </div>
            </div>

            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // === РАЗМЕРЫ ===
        const VIEW_WIDTH = Math.min(window.innerWidth - 40, 1400);
        const VIEW_HEIGHT = Math.min(window.innerHeight - 40, 800);
        const WORLD_WIDTH = 6000;
        const WORLD_HEIGHT = 1200;

        canvas.width = VIEW_WIDTH;
        canvas.height = VIEW_HEIGHT;

        // === DOM ===
        const mainMenu = document.getElementById('mainMenu');
        const pauseMenu = document.getElementById('pauseMenu');
        const pauseBtn = document.getElementById('pauseBtn');
        const startButton = document.getElementById('startButton');
        const resumeBtn = document.getElementById('resumeBtn');
        const restartBtn = document.getElementById('restartBtn');
        const quitBtn = document.getElementById('quitBtn');
        const diffButtons = document.querySelectorAll('#difficultySelector button');
        const modeButtons = document.querySelectorAll('#modeSelector button');

        // === СОСТОЯНИЕ ===
        let gameRunning = false;
        let gamePaused = false;
        let selectedDifficulty = 'easy';
        let selectedMode = 'survival';
        let gameTime = 0;
        let difficultyMultiplier = 1;
        let bombCooldown = 0;
        const BOMB_COOLDOWN = 600;

        // === РЕЖИМ РЕАКЦИИ ===
        let reactionTargets = []; // Мишени для реакции
        let reactionTimer = 0;
        let reactionScore = 0;
        let reactionCombo = 0;
        let maxCombo = 0;
        let reactionPhase = 'wait'; // wait, appear, disappear
        let reactionWaitTime = 60;
        let reactionAppearTime = 45;
        let reactionTargetPos = { x: 0, y: 0 };
        let reactionTargetSize = 40;
        let reactionHits = 0;
        let reactionMisses = 0;
        let reactionRound = 0;

        const difficultySettings = {
            easy:   { baseSpawnRate: 55, baseMinSpeed: 0.8,  baseMaxSpeed: 1.5, enemySize: 12, speedScale: 0.015, spawnScale: 0.3 },
            normal: { baseSpawnRate: 40, baseMinSpeed: 1.2,  baseMaxSpeed: 2.2, enemySize: 14, speedScale: 0.025, spawnScale: 0.5 },
            hard:   { baseSpawnRate: 28, baseMinSpeed: 1.8,  baseMaxSpeed: 3.0, enemySize: 16, speedScale: 0.04,  spawnScale: 0.7 }
        };

        // Режим реакции настройки
        const reactionSettings = {
            easy:   { waitMin: 60, waitMax: 120, appearMin: 60, appearMax: 90, targetSize: 50, scoreMultiplier: 1 },
            normal: { waitMin: 30, waitMax: 80,  appearMin: 40, appearMax: 70, targetSize: 35, scoreMultiplier: 2 },
            hard:   { waitMin: 15, waitMax: 45,  appearMin: 25, appearMax: 50, targetSize: 25, scoreMultiplier: 3 }
        };

        // === ИГРОВЫЕ ОБЪЕКТЫ ===
        const keys = { KeyW: false, KeyA: false, KeyS: false, KeyD: false, Space: false };
        const mouse = { x: 0, y: 0, isDown: false };

        const ship = { 
            x: WORLD_WIDTH / 2, 
            y: WORLD_HEIGHT / 2, 
            speed: 7, 
            size: 18, 
            turretAngle: 0, 
            hp: 3, 
            isDead: false 
        };

        let bullets = [];
        let enemies = [];
        let particles = [];
        let stars = [];
        let scanWaves = [];
        let bombExplosions = [];

        let score = 0;
        let enemyTimer = 0;
        let fireCooldown = 0;
        const maxAmmo = 35;
        let ammo = maxAmmo;
        let reloadTimer = 0;
        const reloadTime = 150;
        let screenShake = 0;
        let cameraX = 0;
        let cameraY = 0;

        // === АУДИО ===
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playScanSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playBombSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 1);
        }

        function playHitSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playMissSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // === ЗВЁЗДЫ ===
        function initStars() {
            stars = [];
            for (let i = 0; i < 300; i++) {
                stars.push({
                    x: Math.random() * WORLD_WIDTH,
                    y: Math.random() * WORLD_HEIGHT,
                    size: Math.random() * 2.5,
                    speed: Math.random() * 0.5 + 0.2,
                    parallax: Math.random() * 0.5 + 0.1
                });
            }
        }

        // === ВЫБОР СЛОЖНОСТИ ===
        diffButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                diffButtons.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedDifficulty = btn.dataset.diff;
            });
        });

        // === ВЫБОР РЕЖИМА ===
        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                modeButtons.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedMode = btn.dataset.mode;
                updateControlsHint();
            });
        });

        function updateControlsHint() {
            const hint = document.getElementById('controlsHint');
            if (selectedMode === 'reaction') {
                hint.innerHTML = 'РЕЖИМ РЕАКЦИИ: Кликай по появляющимся мишеням как можно быстрее!<br>ESC — пауза';
            } else {
                hint.innerHTML = 'УПРАВЛЕНИЕ: WASD — движение, МЫШЬ — прицел, ЛКМ — стрельба<br>ПРОБЕЛ — БОМБА | ESC — пауза';
            }
        }

        // === УПРАВЛЕНИЕ ===
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Escape') {
                if (gameRunning) togglePause();
                return;
            }
            if (e.code === 'Space') {
                if (gameRunning && !gamePaused && !ship.isDead && selectedMode === 'survival' && bombCooldown <= 0) {
                    activateBomb();
                }
                keys[e.code] = true;
                e.preventDefault();
                return;
            }
            if (e.code in keys) {
                keys[e.code] = true;
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code in keys) {
                keys[e.code] = false;
                e.preventDefault();
            }
        });

        window.addEventListener('blur', () => {
            Object.keys(keys).forEach(code => keys[code] = false);
            mouse.isDown = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                initAudio();
                
                if (selectedMode === 'reaction' && gameRunning && !gamePaused) {
                    checkReactionClick();
                    return;
                }
                
                if (ship.isDead) {
                    restartGame();
                } else {
                    mouse.isDown = true;
                }
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (e.button === 0) mouse.isDown = false;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.isDown = false;
        });

        // === ТАЧ ===
        const touchState = {
            moveTouchId: null,
            shootTouchId: null,
            moveX: 0,
            moveY: 0,
            shooting: false,
            shootX: 0,
            shootY: 0
        };

        function updateTouchMovement(touch) {
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            if (x < rect.width / 2) {
                touchState.moveX = x;
                touchState.moveY = y;
            } else {
                touchState.shootX = x;
                touchState.shootY = y;
            }
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();
            
            if (selectedMode === 'reaction' && gameRunning && !gamePaused) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    const rect = canvas.getBoundingClientRect();
                    mouse.x = touch.clientX - rect.left;
                    mouse.y = touch.clientY - rect.top;
                    checkReactionClick();
                }
                return;
            }
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const rect = canvas.getBoundingClientRect();
                const x = touch.clientX - rect.left;
                if (x < rect.width / 2 && touchState.moveTouchId === null) {
                    touchState.moveTouchId = touch.identifier;
                    updateTouchMovement(touch);
                } else if (x >= rect.width / 2 && touchState.shootTouchId === null) {
                    touchState.shootTouchId = touch.identifier;
                    updateTouchMovement(touch);
                    touchState.shooting = true;
                }
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === touchState.moveTouchId || touch.identifier === touchState.shootTouchId) {
                    updateTouchMovement(touch);
                }
            }
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === touchState.moveTouchId) {
                    touchState.moveTouchId = null;
                    touchState.moveX = 0;
                    touchState.moveY = 0;
                }
                if (touch.identifier === touchState.shootTouchId) {
                    touchState.shootTouchId = null;
                    touchState.shooting = false;
                }
            }
        });

        function applyTouchInput() {
            if (touchState.moveTouchId !== null) {
                const dx = touchState.moveX - canvas.width / 4;
                const dy = touchState.moveY - canvas.height / 2;
                ship.x += Math.sign(dx) * ship.speed;
                ship.y += Math.sign(dy) * ship.speed;
            }
            if (touchState.shooting) {
                mouse.x = touchState.shootX;
                mouse.y = touchState.shootY;
                mouse.isDown = true;
            }
        }

        // === МЕНЮ ===
        function startGame() {
            gameRunning = true;
            gamePaused = false;
            gameTime = 0;
            difficultyMultiplier = 1;
            bombCooldown = 0;
            mainMenu.style.display = 'none';
            pauseMenu.style.display = 'none';
            pauseBtn.style.display = 'block';
            restartGame();
            initAudio();
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            pauseMenu.style.display = gamePaused ? 'flex' : 'none';
        }

        function resumeGame() {
            gamePaused = false;
            pauseMenu.style.display = 'none';
        }

        function quitToMenu() {
            gameRunning = false;
            gamePaused = false;
            pauseMenu.style.display = 'none';
            pauseBtn.style.display = 'none';
            mainMenu.style.display = 'flex';
        }

        startButton.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        resumeBtn.addEventListener('click', resumeGame);
        restartBtn.addEventListener('click', () => {
            resumeGame();
            restartGame();
        });
        quitBtn.addEventListener('click', quitToMenu);

        // === РЕЖИМ РЕАКЦИИ ===
        function spawnReactionTarget() {
            const settings = reactionSettings[selectedDifficulty];
            reactionRound++;
            
            // Случайная позиция мишени (с отступом от краёв)
            const padding = 100;
            reactionTargetPos = {
                x: padding + Math.random() * (VIEW_WIDTH - padding * 2),
                y: padding + Math.random() * (VIEW_HEIGHT - padding * 2)
            };
            
            reactionTargetSize = settings.targetSize;
            reactionPhase = 'appear';
            reactionAppearTime = settings.appearMin + Math.random() * (settings.appearMax - settings.appearMin);
            reactionTimer = 0;
        }

        function checkReactionClick() {
            if (reactionPhase !== 'appear') return;
            
            const dist = Math.hypot(mouse.x - reactionTargetPos.x, mouse.y - reactionTargetPos.y);
            
            if (dist < reactionTargetSize + 10) {
                // Попадание!
                reactionHits++;
                reactionCombo++;
                if (reactionCombo > maxCombo) maxCombo = reactionCombo;
                
                const settings = reactionSettings[selectedDifficulty];
                const points = 100 * settings.scoreMultiplier * (1 + reactionCombo * 0.5);
                reactionScore += Math.floor(points);
                
                playHitSound();
                createExplosion(reactionTargetPos.x, reactionTargetPos.y, '#00ff00', 20);
                createExplosion(reactionTargetPos.x, reactionTargetPos.y, '#ffff00', 10);
                
                // Следующая мишень
                const nextSettings = reactionSettings[selectedDifficulty];
                reactionPhase = 'wait';
                reactionWaitTime = Math.max(10, nextSettings.waitMin - reactionRound * 2 + Math.random() * (nextSettings.waitMax - nextSettings.waitMin));
                reactionTimer = 0;
            } else {
                // Промах
                reactionMisses++;
                reactionCombo = 0;
                playMissSound();
                screenShake = 5;
            }
        }

        function updateReaction() {
            if (!gameRunning || gamePaused) return;
            
            reactionTimer++;
            
            if (reactionPhase === 'wait') {
                if (reactionTimer >= reactionWaitTime) {
                    spawnReactionTarget();
                }
            } else if (reactionPhase === 'appear') {
                if (reactionTimer >= reactionAppearTime) {
                    // Мишень исчезла — промах
                    reactionMisses++;
                    reactionCombo = 0;
                    playMissSound();
                    reactionPhase = 'wait';
                    
                    const settings = reactionSettings[selectedDifficulty];
                    reactionWaitTime = settings.waitMin + Math.random() * (settings.waitMax - settings.waitMin);
                    reactionTimer = 0;
                }
            }
            
            // Частицы
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            if (screenShake > 0) screenShake--;
        }

        function drawReaction() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Фоновые звёзды (статичные для реакции)
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                if (s.x > 0 && s.x < VIEW_WIDTH && s.y > 0 && s.y < VIEW_HEIGHT) {
                    ctx.globalAlpha = s.size / 2;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.globalAlpha = 1;
            
            // Частицы
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;
            
            // Мишень
            if (reactionPhase === 'appear') {
                const timeLeft = 1 - (reactionTimer / reactionAppearTime);
                const pulse = Math.sin(Date.now() / 50) * 0.2 + 0.8;
                const size = reactionTargetSize * (0.8 + timeLeft * 0.2);
                
                // Внешнее кольцо (мигает)
                ctx.strokeStyle = `rgba(255, 0, 0, ${pulse})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(reactionTargetPos.x, reactionTargetPos.y, size * 1.3, 0, Math.PI * 2);
                ctx.stroke();
                
                // Внутренняя мишень
                const gradient = ctx.createRadialGradient(
                    reactionTargetPos.x, reactionTargetPos.y, 0,
                    reactionTargetPos.x, reactionTargetPos.y, size
                );
                gradient.addColorStop(0, '#ff0000');
                gradient.addColorStop(0.5, '#ff6600');
                gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(reactionTargetPos.x, reactionTargetPos.y, size, 0, Math.PI * 2);
                ctx.fill();
                
                // Центр
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(reactionTargetPos.x, reactionTargetPos.y, size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                
                // Таймер исчезновения
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(reactionTargetPos.x, reactionTargetPos.y, size * 1.5, -Math.PI / 2, -Math.PI / 2 + (timeLeft * Math.PI * 2));
                ctx.stroke();
            }
            
            // Ожидание — индикатор
            if (reactionPhase === 'wait') {
                const progress = reactionTimer / reactionWaitTime;
                ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
                ctx.fillRect(VIEW_WIDTH / 2 - 100, VIEW_HEIGHT / 2 - 5, 200 * progress, 10);
                ctx.strokeStyle = '#00f0ff';
                ctx.strokeRect(VIEW_WIDTH / 2 - 100, VIEW_HEIGHT / 2 - 5, 200, 10);
                
                ctx.fillStyle = '#00f0ff';
                ctx.font = '20px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('ГОТОВЬСЯ...', VIEW_WIDTH / 2, VIEW_HEIGHT / 2 - 20);
                ctx.textAlign = 'left';
            }
            
            // ИНТЕРФЕЙС
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 20px Courier New';
            ctx.fillText(`СЧЕТ: ${reactionScore}`, 20, 35);
            
            ctx.fillStyle = '#00f0ff';
            ctx.font = '16px Courier New';
            ctx.fillText(`КОМБО: x${reactionCombo}`, 20, 60);
            ctx.fillText(`МАКС КОМБО: ${maxCombo}`, 20, 80);
            ctx.fillText(`РАУНД: ${reactionRound}`, 20, 100);
            
            ctx.fillStyle = '#00ff00';
            ctx.fillText(`ПОПАДАНИЯ: ${reactionHits}`, VIEW_WIDTH - 200, 35);
            ctx.fillStyle = '#ff4444';
            ctx.fillText(`ПРОМАХИ: ${reactionMisses}`, VIEW_WIDTH - 200, 55);
            
            // Точность
            const total = reactionHits + reactionMisses;
            if (total > 0) {
                const accuracy = ((reactionHits / total) * 100).toFixed(1);
                ctx.fillStyle = '#ffff00';
                ctx.fillText(`ТОЧНОСТЬ: ${accuracy}%`, VIEW_WIDTH - 200, 75);
            }
            
            // Рекорд
            const bestScore = localStorage.getItem('reactionBest_' + selectedDifficulty) || 0;
            ctx.fillStyle = '#ffaa00';
            ctx.fillText(`РЕКОРД: ${bestScore}`, VIEW_WIDTH - 200, 95);
        }

        // === ИГРОВЫЕ ФУНКЦИИ ===
        function createExplosion(x, y, color, amount) {
            for (let i = 0; i < amount; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color,
                    size: Math.random() * 3 + 1
                });
            }
        }

        function damageShip(player) {
            createExplosion(player.x, player.y, '#ffffff', 20);
            player.hp--;
            screenShake = 15;
            if (player.hp <= 0) {
                createExplosion(player.x, player.y, '#00f0ff', 50);
                player.isDead = true;
            }
        }

        function activateBomb() {
            if (bombCooldown > 0) return;
            bombCooldown = BOMB_COOLDOWN;
            playBombSound();
            
            bombExplosions.push({
                x: ship.x,
                y: ship.y,
                radius: 0,
                maxRadius: 400,
                alpha: 1
            });
            
            let killed = 0;
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dist = Math.hypot(ship.x - e.x, ship.y - e.y);
                if (dist < 500) {
                    createExplosion(e.x, e.y, '#ff6600', 25);
                    createExplosion(e.x, e.y, '#ffff00', 15);
                    enemies.splice(i, 1);
                    score += 10;
                    killed++;
                }
            }
            
            screenShake = 25;
        }

        function restartGame() {
            // Сброс выживания
            ship.hp = 3;
            ship.isDead = false;
            ship.x = WORLD_WIDTH / 2;
            ship.y = WORLD_HEIGHT / 2;
            ship.turretAngle = 0;
            bullets = [];
            enemies = [];
            particles = [];
            scanWaves = [];
            bombExplosions = [];
            score = 0;
            enemyTimer = 0;
            fireCooldown = 0;
            screenShake = 0;
            ammo = maxAmmo;
            reloadTimer = 0;
            bombCooldown = 0;
            mouse.isDown = false;
            gameTime = 0;
            difficultyMultiplier = 1;
            cameraX = 0;
            cameraY = 0;
            
            // Сброс реакции
            reactionScore = 0;
            reactionCombo = 0;
            maxCombo = 0;
            reactionHits = 0;
            reactionMisses = 0;
            reactionRound = 0;
            reactionPhase = 'wait';
            reactionTimer = 0;
            
            initStars();
        }

        function getCurrentDifficulty() {
            const settings = difficultySettings[selectedDifficulty];
            const progress = Math.min(gameTime / 600, 15);
            difficultyMultiplier = 1 + progress * settings.speedScale;
            const currentSpawnRate = Math.max(5, settings.baseSpawnRate - progress * settings.spawnScale * 3);
            const currentMinSpeed = settings.baseMinSpeed * difficultyMultiplier;
            const currentMaxSpeed = settings.baseMaxSpeed * difficultyMultiplier;
            
            return {
                spawnRate: currentSpawnRate,
                minSpeed: currentMinSpeed,
                maxSpeed: currentMaxSpeed,
                enemySize: settings.enemySize,
                progress: progress
            };
        }

        function spawnScanWave() {
            scanWaves.push({
                x: ship.x,
                y: ship.y,
                radius: 0,
                maxRadius: 800,
                alpha: 1,
                detectedEnemies: []
            });
            playScanSound();
        }

        function updateSurvival() {
            if (gamePaused || ship.isDead) return;

            gameTime++;
            const diff = getCurrentDifficulty();

            if (bombCooldown > 0) bombCooldown--;

            applyTouchInput();

            cameraX = ship.x - VIEW_WIDTH / 2;
            cameraY = ship.y - VIEW_HEIGHT / 2;
            if (cameraX < 0) cameraX = 0;
            if (cameraX > WORLD_WIDTH - VIEW_WIDTH) cameraX = WORLD_WIDTH - VIEW_WIDTH;
            if (cameraY < 0) cameraY = 0;
            if (cameraY > WORLD_HEIGHT - VIEW_HEIGHT) cameraY = WORLD_HEIGHT - VIEW_HEIGHT;

            stars.forEach(s => {
                s.y += s.speed;
                if (s.y > WORLD_HEIGHT) {
                    s.y = 0;
                    s.x = Math.random() * WORLD_WIDTH;
                }
            });

            if (keys.KeyW) ship.y -= ship.speed;
            if (keys.KeyS) ship.y += ship.speed;
            if (keys.KeyA) ship.x -= ship.speed;
            if (keys.KeyD) ship.x += ship.speed;

            if (ship.x < ship.size) ship.x = ship.size;
            if (ship.x > WORLD_WIDTH - ship.size) ship.x = WORLD_WIDTH - ship.size;
            if (ship.y < ship.size) ship.y = ship.size;
            if (ship.y > WORLD_HEIGHT - ship.size) ship.y = WORLD_HEIGHT - ship.size;

            ship.turretAngle = Math.atan2(
                (mouse.y + cameraY) - ship.y, 
                (mouse.x + cameraX) - ship.x
            );

            if (reloadTimer > 0) {
                reloadTimer--;
                if (reloadTimer === 0) ammo = maxAmmo;
            } else {
                if (fireCooldown > 0) fireCooldown--;
                if (mouse.isDown && fireCooldown === 0 && ammo > 0) {
                    bullets.push({ 
                        x: ship.x, 
                        y: ship.y, 
                        angle: ship.turretAngle, 
                        speed: 20 
                    });
                    ammo--;
                    fireCooldown = 5;
                    if (ammo === 0) reloadTimer = reloadTime;
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += Math.cos(b.angle) * b.speed;
                b.y += Math.sin(b.angle) * b.speed;
                if (b.x < 0 || b.x > WORLD_WIDTH || b.y < 0 || b.y > WORLD_HEIGHT) {
                    bullets.splice(i, 1);
                }
            }

            if (gameTime % 300 === 0) {
                spawnScanWave();
            }

            for (let i = scanWaves.length - 1; i >= 0; i--) {
                const wave = scanWaves[i];
                wave.radius += 8;
                wave.alpha -= 0.015;
                
                enemies.forEach(e => {
                    const dist = Math.hypot(wave.x - e.x, wave.y - e.y);
                    if (Math.abs(dist - wave.radius) < 20 && !wave.detectedEnemies.includes(e)) {
                        wave.detectedEnemies.push(e);
                        e.scanned = true;
                        e.scanTimer = 60;
                    }
                });
                
                if (wave.alpha <= 0 || wave.radius > wave.maxRadius) {
                    scanWaves.splice(i, 1);
                }
            }

            enemyTimer++;
            if (enemyTimer > diff.spawnRate) {
                const spawnSide = Math.random();
                let ex, ey;
                const margin = 100;
                
                if (spawnSide < 0.5) {
                    ex = Math.random() < 0.5 ? cameraX - margin : cameraX + VIEW_WIDTH + margin;
                    ey = cameraY + Math.random() * VIEW_HEIGHT;
                } else {
                    ex = cameraX + Math.random() * VIEW_WIDTH;
                    ey = Math.random() < 0.5 ? cameraY - margin : cameraY + VIEW_HEIGHT + margin;
                }
                
                ex = Math.max(20, Math.min(WORLD_WIDTH - 20, ex));
                ey = Math.max(20, Math.min(WORLD_HEIGHT - 20, ey));
                
                enemies.push({
                    x: ex,
                    y: ey,
                    speed: diff.minSpeed + Math.random() * (diff.maxSpeed - diff.minSpeed),
                    size: diff.enemySize,
                    angle: 0,
                    rotationSpeed: (Math.random() - 0.5) * 0.1,
                    scanned: false,
                    scanTimer: 0
                });
                enemyTimer = 0;
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let angleToShip = Math.atan2(ship.y - e.y, ship.x - e.x);
                e.x += Math.cos(angleToShip) * e.speed;
                e.y += Math.sin(angleToShip) * e.speed;
                e.angle += e.rotationSpeed;
                
                if (e.scanTimer > 0) e.scanTimer--;

                if (e.x < -300 || e.x > WORLD_WIDTH + 300 || e.y < -300 || e.y > WORLD_HEIGHT + 300) {
                    enemies.splice(i, 1);
                    continue;
                }

                if (Math.hypot(ship.x - e.x, ship.y - e.y) < ship.size + e.size) {
                    damageShip(ship);
                    enemies.splice(i, 1);
                    continue;
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (Math.hypot(b.x - e.x, b.y - e.y) < e.size + 10) {
                        createExplosion(e.x, e.y, '#ffffff', 15);
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10;
                        break;
                    }
                }
            }

            for (let i = bombExplosions.length - 1; i >= 0; i--) {
                const exp = bombExplosions[i];
                exp.radius += 15;
                exp.alpha -= 0.02;
                if (exp.alpha <= 0 || exp.radius > exp.maxRadius) {
                    bombExplosions.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawUFO(ctx, x, y, size, angle, scanned, scanTimer) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            if (scanned && scanTimer > 0) {
                const pulse = Math.sin(Date.now() / 100) * 0.3 + 0.7;
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 20 * pulse;
            }
            
            ctx.fillStyle = scanned && scanTimer > 0 ? '#ff4444' : '#888888';
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 1.5, size * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = scanned && scanTimer > 0 ? '#ff8888' : '#aaddff';
            ctx.beginPath();
            ctx.arc(0, -size * 0.3, size * 0.5, Math.PI, 0);
            ctx.fill();
            
            const lights = 6;
            for (let i = 0; i < lights; i++) {
                const lightAngle = (Math.PI * 2 / lights) * i + Date.now() / 200;
                const lx = Math.cos(lightAngle) * size * 1.2;
                const ly = Math.sin(lightAngle) * size * 0.4;
                ctx.fillStyle = `hsl(${(Date.now() / 10 + i * 60) % 360}, 100%, 50%)`;
                ctx.beginPath();
                ctx.arc(lx, ly, 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, -size * 0.8);
            ctx.lineTo(0, -size * 1.2);
            ctx.stroke();
            
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(0, -size * 1.2, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function drawSurvival() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            if (screenShake > 0) {
                ctx.translate(
                    (Math.random() - 0.5) * screenShake, 
                    (Math.random() - 0.5) * screenShake
                );
                screenShake--;
            }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-cameraX, -cameraY);

            stars.forEach(s => {
                const parallaxX = s.x - cameraX * s.parallax;
                const parallaxY = s.y - cameraY * s.parallax;
                
                if (parallaxX > cameraX - 50 && parallaxX < cameraX + VIEW_WIDTH + 50 &&
                    parallaxY > cameraY - 50 && parallaxY < cameraY + VIEW_HEIGHT + 50) {
                    ctx.globalAlpha = s.size / 2;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(parallaxX, parallaxY, s.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.globalAlpha = 1;

            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;

            scanWaves.forEach(wave => {
                ctx.strokeStyle = `rgba(0, 255, 0, ${wave.alpha})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.strokeStyle = `rgba(0, 255, 0, ${wave.alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(wave.x, wave.y, wave.radius * 0.7, 0, Math.PI * 2);
                ctx.stroke();
            });

            bombExplosions.forEach(exp => {
                const gradient = ctx.createRadialGradient(exp.x, exp.y, 0, exp.x, exp.y, exp.radius);
                gradient.addColorStop(0, `rgba(255, 200, 0, ${exp.alpha})`);
                gradient.addColorStop(0.5, `rgba(255, 100, 0, ${exp.alpha * 0.5})`);
                gradient.addColorStop(1, `rgba(255, 0, 0, 0)`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.lineWidth = 3;
            ctx.strokeStyle = '#00f0ff';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.moveTo(b.x, b.y);
                ctx.lineTo(b.x - Math.cos(b.angle) * 20, b.y - Math.sin(b.angle) * 20);
                ctx.stroke();
            });

            enemies.forEach(e => {
                drawUFO(ctx, e.x, e.y, e.size, e.angle, e.scanned, e.scanTimer);
            });

            if (!ship.isDead) {
                ctx.save();
                ctx.translate(ship.x, ship.y);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -25);
                ctx.lineTo(18, 15);
                ctx.lineTo(0, 8);
                ctx.lineTo(-18, 15);
                ctx.closePath();
                ctx.stroke();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(0, -8);
                ctx.lineTo(6, 8);
                ctx.lineTo(0, 4);
                ctx.lineTo(-6, 8);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                ctx.save();
                ctx.translate(ship.x, ship.y);
                ctx.rotate(ship.turretAngle);
                ctx.strokeStyle = '#00f0ff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(12, 0);
                ctx.lineTo(35, 0);
                ctx.stroke();
                ctx.restore();
            }

            ctx.restore();
            ctx.restore();

            // ИНТЕРФЕЙС
            const diff = getCurrentDifficulty();
            const seconds = Math.floor(gameTime / 60);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 16px Courier New';
            ctx.fillText(`СИСТЕМЫ: ${'█ '.repeat(ship.hp)}`, 20, 30);
            ctx.fillText(`СЧЕТ: ${score}`, VIEW_WIDTH - 140, 30);
            
            ctx.fillStyle = '#00f0ff';
            ctx.font = '14px Courier New';
            ctx.fillText(`ВРЕМЯ: ${seconds}с`, 20, 55);
            ctx.fillText(`СЛОЖНОСТЬ: ${(difficultyMultiplier).toFixed(1)}x`, 20, 75);

            if (bombCooldown > 0) {
                const bombSec = Math.ceil(bombCooldown / 60);
                ctx.fillStyle = '#ff4444';
                ctx.fillText(`БОМБА: ${bombSec}с`, 20, 95);
            } else {
                ctx.fillStyle = '#00ff00';
                ctx.fillText('БОМБА: ГОТОВА [ПРОБЕЛ]', 20, 95);
            }

            if (reloadTimer > 0) {
                if (Math.floor(Date.now() / 200) % 2 === 0) {
                    ctx.fillStyle = '#00f0ff';
                    ctx.fillText('ПЕРЕЗАРЯДКА...', VIEW_WIDTH - 160, 55);
                }
            } else {
                ctx.strokeStyle = '#00f0ff';
                ctx.strokeRect(VIEW_WIDTH - 140, 42, 100, 10);
                ctx.fillStyle = '#00f0ff';
                ctx.fillRect(VIEW_WIDTH - 140, 42, (ammo / maxAmmo) * 100, 10);
            }

            // МИНИ-КАРТА
            const mapSize = 140;
            const mapX = VIEW_WIDTH - mapSize - 20;
            const mapY = VIEW_HEIGHT - mapSize - 20;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(mapX, mapY, mapSize, mapSize);
            ctx.strokeStyle = '#00f0ff';
            ctx.lineWidth = 1;
            ctx.strokeRect(mapX, mapY, mapSize, mapSize);
            
            const viewMapX = mapX + (cameraX / WORLD_WIDTH) * mapSize;
            const viewMapY = mapY + (cameraY / WORLD_HEIGHT) * mapSize;
            const viewMapW = (VIEW_WIDTH / WORLD_WIDTH) * mapSize;
            const viewMapH = (VIEW_HEIGHT / WORLD_HEIGHT) * mapSize;
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.strokeRect(viewMapX, viewMapY, viewMapW, viewMapH);
            
            const mapShipX = mapX + (ship.x / WORLD_WIDTH) * mapSize;
            const mapShipY = mapY + (ship.y / WORLD_HEIGHT) * mapSize;
            ctx.fillStyle = '#00f0ff';
            ctx.beginPath();
            ctx.arc(mapShipX, mapShipY, 3, 0, Math.PI * 2);
            ctx.fill();
            
            enemies.forEach(e => {
                const ex = mapX + (e.x / WORLD_WIDTH) * mapSize;
                const ey = mapY + (e.y / WORLD_HEIGHT) * mapSize;
                
                if (e.scanned && e.scanTimer > 0) {
                    const pulse = Math.sin(Date.now() / 100) * 0.5 + 0.5;
                    ctx.fillStyle = `rgba(255, 0, 0, ${pulse})`;
                    ctx.beginPath();
                    ctx.arc(ex, ey, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(ex - 1.5, ey - 1.5, 3, 3);
            });
            
            scanWaves.forEach(wave => {
                const waveX = mapX + (wave.x / WORLD_WIDTH) * mapSize;
                const waveY = mapY + (wave.y / WORLD_HEIGHT) * mapSize;
                const waveR = (wave.radius / WORLD_WIDTH) * mapSize;
                ctx.strokeStyle = `rgba(0, 255, 0, ${wave.alpha})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(waveX, waveY, waveR, 0, Math.PI * 2);
                ctx.stroke();
            });

            if (ship.isDead) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
                ctx.fillStyle = '#00f0ff';
                ctx.textAlign = 'center';
                ctx.font = 'bold 40px Courier New';
                ctx.fillText('СИСТЕМНЫЙ СБОЙ', VIEW_WIDTH / 2, VIEW_HEIGHT / 2 - 50);
                ctx.fillStyle = '#ffffff';
                ctx.font = '20px Courier New';
                ctx.fillText(`Уничтожено целей: ${score / 10}`, VIEW_WIDTH / 2, VIEW_HEIGHT / 2);
                ctx.fillText(`Прожито: ${seconds} секунд`, VIEW_WIDTH / 2, VIEW_HEIGHT / 2 + 30);
                ctx.fillText('Кликните для перезапуска', VIEW_WIDTH / 2, VIEW_HEIGHT / 2 + 70);
                ctx.textAlign = 'left';
            }
        }

        function update() {
            if (!gameRunning) return;
            
            if (selectedMode === 'reaction') {
                updateReaction();
            } else {
                updateSurvival();
            }
        }

        function draw() {
            if (!gameRunning) return;
            
            if (selectedMode === 'reaction') {
                drawReaction();
            } else {
                drawSurvival();
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        initStars();
        loop();

        window.addEventListener('resize', () => {
            const newWidth = Math.min(window.innerWidth - 40, 1400);
            const newHeight = Math.min(window.innerHeight - 40, 800);
            canvas.width = newWidth;
            canvas.height = newHeight;
        });
    </script>
</body>
</html>
